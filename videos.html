<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. AGGRESSIVELY RESET THEME OFFSETS AND MARGINS */
        .container, .container-md, .container-fluid, .row {
            max-width: 100% !important;
            padding: 0 !important;
            margin: 0 !important;
            width: 100% !important;
        }
        
        [class*="col-"] {
            max-width: 100% !important;
            flex: 0 0 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* 2. MAIN CONTAINER - Forced block to break old side-by-side flex layout */
        .videos-page-container {
            display: block !important; 
            width: 100% !important;
            max-width: 1200px; 
            margin: 30px auto !important;
            padding: 0 20px !important;
            box-sizing: border-box;
        }

        /* 3. HORIZONTAL NAVIGATION - Forced Center */
        .sub-nav-options {
            display: block !important;
            width: 100% !important;
            margin: 0 auto 3rem auto !important;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }

        .sub-nav-list {
            display: flex !important;
            justify-content: center !important; /* Strictly centers the years */
            align-items: center !important;
            width: 100% !important;
            gap: 2.5rem;
            list-style: none !important;
            padding: 0 !important;
            margin: 0 !important;
            flex-wrap: wrap;
        }

        .sub-nav-list li {
            font-family: 'Amatic SC', cursive !important;
            font-size: 2rem !important;
            color: #718096;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            padding-bottom: 5px;
            border-bottom: 3px solid transparent;
        }

        .sub-nav-list li:hover, .sub-nav-list li.active {
            color: #5f745f !important;
            border-bottom: 3px solid #5f745f;
            font-weight: bold;
        }

        /* 4. VIDEO CONTENT GRID */
        .videos-content {
            display: block !important;
            width: 100% !important;
        }

        .video-grid {
            display: grid;
            /* Videos look slightly better a bit wider than photos, so using 320px min */
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            justify-content: center;
            gap: 30px; 
            width: 100%;
        }

        .video-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .video-wrapper {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9; /* Standard video widescreen ratio */
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #000;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .video-wrapper:hover {
            transform: translateY(-3px);
        }

        .video-wrapper img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .video-item figcaption {
            font-size: 1.2rem !important;
            text-align: center;
            white-space: normal; 
            margin-top: 12px;
            color: #4a5568;
            line-height: 1.3;
        }

        /* 5. MOBILE ADJUSTMENTS */
        @media (max-width: 992px) {
            .sub-nav-list {
                gap: 1.5rem;
            }

            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 20px;
            }
        }
        
        .hidden-item { display: none !important; }

        .load-more-container {
            text-align: center;
            margin-top: 3rem;
            width: 100%;
        }

        .btn-load-more {
            background-color: #5f745f;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-load-more:hover {
            background-color: #4a5b4a;
        }
    </style>
</head>

    <script>
    const itemsPerPage = 10;

    function filterVideos(year, element) {
        // 1. INSTANT SCROLL TO TOP
        window.scrollTo({ top: 0, behavior: 'smooth' });

        const allItems = Array.from(document.querySelectorAll('.video-item'));
        
        // 2. Highlight active sub-nav item
        document.querySelectorAll('.sub-nav-list li').forEach(li => li.classList.remove('active'));
        if (element) element.classList.add('active');

        // 3. Filter items based on year
        const matched = allItems.filter(item => 
            year === 'all' || item.getAttribute('data-academic-year') === year
        );

        // 4. Hide all items initially
        allItems.forEach(item => item.classList.add('hidden-item'));

        // 5. Show the first batch of matched videos
        matched.slice(0, itemsPerPage).forEach(item => item.classList.remove('hidden-item'));

        // 6. Load More Logic
        updateVideoLoadMore(matched);
    }

    function updateVideoLoadMore(matchedList) {
        const btn = document.getElementById('load-more-btn');
        // Find videos that belong to the current year but are still hidden
        const hiddenInMatch = matchedList.filter(item => item.classList.contains('hidden-item'));

        if (hiddenInMatch.length > 0) {
            btn.parentElement.style.display = 'block';
            btn.onclick = function() {
                // Show the next batch
                const nextBatch = hiddenInMatch.slice(0, itemsPerPage);
                nextBatch.forEach(el => el.classList.remove('hidden-item'));
                
                // Re-run to check if button should disappear
                updateVideoLoadMore(matchedList);
            };
        } else {
            btn.parentElement.style.display = 'none';
        }
    }

    // Function to swap thumbnail for the actual YouTube iframe
    function loadVideo(container) {
        const videoId = container.getAttribute('data-video');
        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" 
                                frameborder="0" 
                                allow="autoplay; encrypted-media" 
                                allowfullscreen 
                                style="width:100%; height:100%;"></iframe>`;
    }

    document.addEventListener("DOMContentLoaded", () => {
        // Initialize with the current academic year targeting the sub-nav-list
        const activeLi = document.querySelector('.sub-nav-list li.active');
        filterVideos('2025-26', activeLi);
    });
</script>
