  <script>
    const itemsPerPage = 10;
    let currentYearFilter = '2025-26';

    function filterAcademicYear(year, element) {
        // 0. INSTANT SCROLL TO TOP
        window.scrollTo({ top: 0, behavior: 'smooth' });

        currentYearFilter = year;
        const allItems = Array.from(document.querySelectorAll('.album-item'));
        
        // 1. Update Active state in the new Sub-Nav
        document.querySelectorAll('.sub-nav-list li').forEach(li => li.classList.remove('active'));
        if(element) element.classList.add('active');

        // 2. Hide everything initially
        allItems.forEach(item => {
            item.classList.add('hidden-item');
        });

        // 3. Find matches for the specific year
        const matched = allItems.filter(item => 
            year === 'all' || item.getAttribute('data-academic-year') === year
        );

        // 4. Show the first batch of matched items
        matched.slice(0, itemsPerPage).forEach(item => {
            item.classList.remove('hidden-item');
        });

        // 5. Update the "Load More" button logic
        updateLoadMoreButton(matched);
    }

    function updateLoadMoreButton(matchedList) {
        const btn = document.getElementById('load-more-btn');
        // Find items that belong to this year but are currently hidden
        const hiddenItemsInMatch = matchedList.filter(item => item.classList.contains('hidden-item'));

        if (hiddenItemsInMatch.length > 0) {
            btn.parentElement.style.display = 'block';
            btn.onclick = function() {
                const nextBatch = hiddenItemsInMatch.slice(0, itemsPerPage);
                nextBatch.forEach(el => el.classList.remove('hidden-item'));
                // Refresh button state
                updateLoadMoreButton(matchedList);
            };
        } else {
            btn.parentElement.style.display = 'none';
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        // Updated to target the new sub-nav-list active element
        filterAcademicYear('2025-26', document.querySelector('.sub-nav-list li.active'));
    });
</script>
