---
layout: base
---

<main class="{% if page.full-width %} container-fluid {% else %} container-md {% endif %}">
  <div class="row">
    <div class="{% if page.full-width %} col {% else %} col-xl-8 offset-xl-2 col-lg-10 offset-lg-1 {% endif %}">

      <div class="back-navigation mb-4">
        <a href="/profiles" id="back-button">
          <i class="fas fa-chevron-left"></i> 
          Back
        </a>
      </div>

      <div class="profile-header row align-items-center mb-4">
        
        <div class="col-3 col-md-2 text-center text-md-start">
          {% if page.profile-image %}
            <img src="{{ page.profile-image | relative_url }}" alt="{{ page.title }}" class="img-fluid rounded-circle profile-pic">
          {% else %}
            <img src="/assets/img/default-avatar.png" alt="Default Avatar" class="img-fluid rounded-circle profile-pic">
          {% endif %}
        </div>

        <div class="col-9 col-md-10">
          <!-- Added clean CSS class overrides for typography reduction -->
          <h3 class="post-title mb-1">{{ page.title }}</h1>
          
          {% if page.subtitle %}
            <h4 class="post-subtitle text-muted fw-normal mb-2">
              {{ page.subtitle }}
            </h2>
          {% endif %}
          
          <span class="profile-meta text-muted small">
            Last updated on {{ page.date | date: "%B %-d, %Y" }}
          </span>
        </div>
        
      </div>

      <hr class="my-4">

      <div class="profile-content">
        {{ content }}
      </div>

    </div>
  </div>
</main>

<style>
/* Keeps your avatar structure sound and clean */
.profile-pic {
  width: 100%;
  aspect-ratio: 1 / 1.75;
  object-fit: cover;
  max-width: 25vw;
}

/* Reduced heading size by 50% (Standard H1 is ~2.5rem) */
.profile-name {
  font-size: 1.5vw !important;
  font-weight: bold;
}

/* Reduced subheading size by 50% (Standard H4 is ~1.5rem) */
.profile-subheading {
  font-size: 1.25vw !important;
}
</style>
